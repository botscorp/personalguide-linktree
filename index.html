<!DOCTYPE html>
<html lang="es-419">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Guide — Tu guía personal en WhatsApp</title>
  <meta name="description" content="Asistentes personales de IA por WhatsApp. Acompañamiento real, todos los días, a tu lado." />
  <meta property="og:title" content="Personal Guide" />
  <meta property="og:description" content="Asistentes personales de IA por WhatsApp." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://personalguide.chat" />
  <meta property="og:image" content="https://personalguide.chat/logo-q7.png" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo-q7.png" />
  <link rel="shortcut icon" href="/favicon.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            q7green: {
              50:  '#f0f9f3',
              100: '#dcf0e3',
              200: '#b8e1c8',
              500: '#4DAD7A',
              600: '#3e9266',
              700: '#316f4f'
            },
            q7coral: { 400: '#f5896e', 500: '#f4725e' }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    .page-bg {
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(244,114,94,0.12), transparent),
        radial-gradient(ellipse 90% 60% at 50% 100%, rgba(77,173,122,0.10), transparent),
        #fbfaf6;
    }
    .soft-card {
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -8px rgba(77,173,122,0.10);
    }
  </style>
</head>
<body class="page-bg min-h-screen text-slate-800 antialiased font-sans">

  <main class="max-w-md mx-auto px-6 pt-14 pb-12">

    <!-- Header / brand -->
    <header class="text-center mb-10">
      <img src="/logo-q7.png" alt="Personal Guide" class="w-20 h-20 mx-auto mb-5 rounded-2xl soft-card" />
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">Personal Guide</h1>
      <p class="text-sm text-slate-500 mt-2 leading-relaxed">
        Asistentes personales de IA por WhatsApp.<br />
        Acompañamiento real, a tu lado.
      </p>
    </header>

    <!-- Links -->
    <nav class="space-y-3">

      <a href="https://q7.personalguide.chat" class="group block">
        <div class="rounded-2xl bg-white hover:bg-q7green-50 border border-slate-200 hover:border-q7green-300 transition px-5 py-4 flex items-center gap-4 soft-card">
          <div class="text-2xl">🌱</div>
          <div class="flex-1 text-left">
            <div class="font-semibold text-slate-900">Personal Guide Q7</div>
            <div class="text-xs text-slate-500 mt-0.5">Adelgaza con tu guía personal · ciclos de 7 días</div>
          </div>
          <div class="text-slate-300 group-hover:text-q7green-600 transition">→</div>
        </div>
      </a>

      <a href="https://www.theos.guide/" class="group block">
        <div class="rounded-2xl bg-white hover:bg-q7green-50 border border-slate-200 hover:border-q7green-300 transition px-5 py-4 flex items-center gap-4 soft-card">
          <div class="text-2xl">📿</div>
          <div class="flex-1 text-left">
            <div class="font-semibold text-slate-900">Theos Guide</div>
            <div class="text-xs text-slate-500 mt-0.5">Tu guía espiritual diaria</div>
          </div>
          <div class="text-slate-300 group-hover:text-q7green-600 transition">→</div>
        </div>
      </a>

    </nav>

    <!-- Footer -->
    <footer class="text-center mt-16 text-xs text-slate-400">
      <p>© <span id="year"></span> Botscorp · personalguide.chat</p>
    </footer>

  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
